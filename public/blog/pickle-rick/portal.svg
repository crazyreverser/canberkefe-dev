<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="ui-monospace, Menlo, monospace" font-size="13">
  <defs>
    <style>
      .win { fill: #050505; stroke: #1a1a1a; stroke-width: 1; }
      .bar { fill: #1f232b; }
      .barline { stroke: #2a2f3a; stroke-width: 1; }
      .icon { fill: #c0c5cf; }
      .close { fill: #1a2a3e; }
      .closex { stroke: #d8dde6; stroke-width: 2; stroke-linecap: round; }
      .cmd { fill: #c0c4c0; }
      .sig { fill: #229e22; font-weight: 700; }
      .out { fill: #8a8a8a; }
      .err { fill: #ff5f56; }
      .ok  { fill: #229e22; }
      .hl  { fill: #5fafd7; }
    </style>
  </defs>
  <rect width="760" height="360" fill="#000"/>

  <!-- window -->
  <rect class="win" x="20" y="20" width="720" height="320" rx="8"/>
  <rect class="bar" x="20" y="20" width="720" height="34" rx="8"/>
  <rect class="bar" x="20" y="40" width="720" height="14"/>
  <line class="barline" x1="20" y1="54" x2="740" y2="54"/>
  <text x="40" y="40" fill="#c0c5cf" font-size="11">portal.php — POST /portal.php</text>

  <!-- linux controls -->
  <circle cx="660" cy="37" r="9" fill="#3a3f4a"/>
  <circle cx="684" cy="37" r="9" fill="#3a3f4a"/>
  <circle cx="708" cy="37" r="9" class="close"/>
  <line class="closex" x1="704" y1="33" x2="712" y2="41"/>
  <line class="closex" x1="712" y1="33" x2="704" y2="41"/>

  <!-- body -->
  <g transform="translate(36 86)">
    <text class="sig" x="0" y="0">$</text>
    <text class="cmd" x="14" y="0">ls</text>

    <text class="out" x="0" y="22">Sup3rS3cretPickl3Ingred.txt   clue.txt   denied.txt</text>
    <text class="out" x="0" y="40">index.html                    robots.txt</text>

    <text class="sig" x="0" y="74">$</text>
    <text class="cmd" x="14" y="74">cat Sup3rS3cretPickl3Ingred.txt</text>
    <text class="err" x="0" y="94">cat: command disabled</text>

    <text class="sig" x="0" y="128">$</text>
    <text class="cmd" x="14" y="128">less Sup3rS3cretPickl3Ingred.txt</text>
    <text class="hl"  x="0" y="148">mr. meeseek hair</text>
    <text class="ok"  x="0" y="166">[+] flag 1 captured</text>

    <text class="sig" x="0" y="200">$</text>
    <text class="cmd" x="14" y="200">sudo -l</text>
    <text class="out" x="0" y="220">User www-data may run the following commands:</text>
    <text class="hl"  x="0" y="240">    (ALL) NOPASSWD: ALL</text>
    <text class="ok"  x="0" y="260">[+] free root.</text>
  </g>
</svg>
